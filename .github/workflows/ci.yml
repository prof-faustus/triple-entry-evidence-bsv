name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  gate:
    name: fmt + clippy + test + reproduce
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace

      - name: tea-bsv selftest
        run: cargo run --release --quiet -p tee-cli -- selftest

      - name: tea-bsv reproduce
        run: cargo run --release --quiet -p tee-cli -- reproduce

  sweep:
    name: forbidden-token sweep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail on forbidden tokens in the live tree
        # Case-insensitive. Excludes target/ and the workflow file itself
        # (which legitimately names the tokens it is checking for).
        run: |
          set -euo pipefail
          if grep -RInE \
              -e 'bitcoin|secp256k1-zkp|bitcoin-private|blockstream|rust-bitcoin' \
              -e 'libsecp256k1|pedersen|bulletproof|satoshi|lightning' \
              -e 'taproot|segwit|cltv|op_csv|op_checklocktimeverify' \
              -e 'op_checksequenceverify|hal *finney|block *170|libreoffice|soffice' \
              -e 'bip[0-9]+|schnorr' \
              --exclude-dir=target \
              --exclude=ci.yml \
              .; then
            echo "::error::forbidden token(s) found in the live tree"
            exit 1
          fi
          echo "sweep clean"
